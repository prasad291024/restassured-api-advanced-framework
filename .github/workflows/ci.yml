name: API Framework CI

on:
  push:
    branches: [ master, main, develop ]
  pull_request:
    branches: [ master, main ]
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    strategy:
      matrix:
        suite: [testng.xml, testng_parallel.xml]
      fail-fast: false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Cache Maven Dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.m2/repository
            target
          key: ${{ runner.os }}-maven-${{ hashFiles('**/pom.xml') }}
          restore-keys: |
            ${{ runner.os }}-maven-

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Compile
        run: ./mvnw -B clean compile

      - name: Run Tests - ${{ matrix.suite }}
        run: ./mvnw -B test -DsuiteXmlFile=${{ matrix.suite }} -Denv=dev
        continue-on-error: true

      - name: Generate Allure Report
        if: always()
        run: |
          wget https://github.com/allure-framework/allure2/releases/download/2.24.1/allure-2.24.1.tgz
          tar -zxvf allure-2.24.1.tgz
          ./allure-2.24.1/bin/allure generate allure-results --clean -o allure-report

      - name: Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report-${{ matrix.suite }}
          path: allure-report/
          retention-days: 30

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.suite }}
          path: |
            target/surefire-reports/
            test-output/
          retention-days: 30

      - name: Publish Test Summary
        if: always()
        uses: dorny/test-reporter@v1
        with:
          name: Test Results - ${{ matrix.suite }}
          path: target/surefire-reports/*.xml
          reporter: java-junit
          fail-on-error: false

      - name: Add Test Summary to PR
        if: always() && github.event_name == 'pull_request'
        run: |
          echo "## Test Results - ${{ matrix.suite }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f target/surefire-reports/testng-results.xml ]; then
            TOTAL=$(grep -oP '(?<=total=")[^"]*' target/surefire-reports/testng-results.xml | head -1)
            PASSED=$(grep -oP '(?<=passed=")[^"]*' target/surefire-reports/testng-results.xml | head -1)
            FAILED=$(grep -oP '(?<=failed=")[^"]*' target/surefire-reports/testng-results.xml | head -1)
            SKIPPED=$(grep -oP '(?<=skipped=")[^"]*' target/surefire-reports/testng-results.xml | head -1)
            echo "| Metric | Count |" >> $GITHUB_STEP_SUMMARY
            echo "|--------|-------|" >> $GITHUB_STEP_SUMMARY
            echo "| Total | $TOTAL |" >> $GITHUB_STEP_SUMMARY
            echo "| ✅ Passed | $PASSED |" >> $GITHUB_STEP_SUMMARY
            echo "| ❌ Failed | $FAILED |" >> $GITHUB_STEP_SUMMARY
            echo "| ⏭️ Skipped | $SKIPPED |" >> $GITHUB_STEP_SUMMARY
          fi

  retry-verification:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 22
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '22'
          cache: maven

      - name: Make Maven Wrapper Executable
        run: chmod +x mvnw

      - name: Verify Retry Listener
        run: ./mvnw -B test -DsuiteXmlFile=testng_retry_check.xml -Denv=dev
